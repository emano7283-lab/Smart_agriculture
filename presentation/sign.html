<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="sign.css" />
    <title>Smart Property — Sign In</title>
  </head>

  <body>
    <div class="container" id="container">

      <!-- SIGN IN FORM -->
      <div class="form-container sign-in">
        <form id="signInForm">
          <h1>Sign In</h1>
          <div class="icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or use your email password</span>
          <input type="email"    name="email"    placeholder="Email"    required />
          <input type="password" name="password" placeholder="Password" required />
          <a href="#">Forget Your Password?</a>
          <button type="submit">Sign In</button>
          <div id="signin-message" class="auth-message"></div>
        </form>
      </div>

      <!-- SIGN UP FORM -->
      <div class="form-container sign-up">
        <form id="signUpForm">
          <h1>Create Account</h1>
          <div class="icons">
            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
          <span>or use your email for registration</span>
          <input type="email"    name="email"    placeholder="Email"    required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit">Sign Up</button>
          <div id="signup-message" class="auth-message"></div>
        </form>
      </div>

      <!-- TOGGLE PANEL -->
      <div class="to">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Welcome Back!</h1>
            <p>Already have an account? Sign in to continue</p>
            <button class="hidden" id="loginBtn">Sign In</button>
          </div>

          <div class="toggle-panel toggle-right">
            <h1>Hello, Friend!</h1>
            <p>
              We Provide you with a smart and secure real estate platform that
              suits your need
            </p>
            <button class="hidden" id="registerBtn">Sign Up</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/logic/sign.js"></script>
  </body>
</html>
